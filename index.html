<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>Tableau de bord</title>

  <!-- Google Fonts (CORRIGÉ) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#0e0f12; --panel:#15171c; --panel-2:#1b1e24;
      --text:#e7e9ee; --muted:#a7acb7; --accent:#ff5a3c; --ok:#23c55e; --warn:#f59e0b;
      --border:#242832; --chip:#20242c; --shadow:0 8px 24px rgba(0,0,0,.35);
      --radius:12px;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      font:14px/1.4 Inter, system-ui, sans-serif;
    }

    a{color:inherit;text-decoration:none}

    .app{
      display:grid;
      grid-template-columns:260px 1fr;
      min-height:100vh;
    }

    /* SIDEBAR */
    .sidebar{
      background:#0c0d10;
      border-right:1px solid var(--border);
      padding:20px;
      display:flex;
      flex-direction:column;
      gap:16px;
    }

    .brand{
      font-weight:700;
      font-size:16px;
    }

    .nav{
      display:flex;
      flex-direction:column;
      gap:6px;
    }

    .nav a{
      padding:10px;
      border-radius:10px;
      color:var(--muted);
    }

    .nav a:hover,
    .nav a.active{
      background:var(--panel);
      color:var(--text);
    }

    .user{
      margin-top:auto;
      border-top:1px solid var(--border);
      padding-top:16px;
      color:var(--muted);
    }

    /* MAIN */
    .main{
      padding:28px;
    }

    .header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:20px;
    }

    .btn{
      background:var(--panel);
      border:1px solid var(--border);
      color:var(--text);
      padding:10px 14px;
      border-radius:10px;
      cursor:pointer;
    }

    .btn.accent{
      background:var(--accent);
      border:none;
    }

    .chip{
      background:var(--chip);
      padding:4px 10px;
      border-radius:999px;
      font-size:12px;
      color:var(--muted);
    }

    /* GRID */
    .grid{
      display:grid;
      grid-template-columns:repeat(12,1fr);
      gap:16px;
    }

    .card{
      background:var(--panel);
      border:1px solid var(--border);
      border-radius:var(--radius);
      padding:16px;
    }

    .span-3{grid-column:span 3}
    .span-6{grid-column:span 6}
    .span-12{grid-column:span 12}

    .section-title{
      font-size:12px;
      text-transform:uppercase;
      color:var(--muted);
      margin-bottom:10px;
    }

    .kpi{
      font-size:28px;
      font-weight:700;
    }

    .badge{
      padding:4px 8px;
      border-radius:999px;
      font-size:12px;
      border:1px solid var(--border);
    }

    .badge.ok{background:#112417;color:#9ae6b4}
    .badge.warn{background:#2b1f11;color:#f6c68a}

    .list{
      list-style:none;
      padding:0;
      margin:0;
    }

    .item{
      display:flex;
      justify-content:space-between;
      padding:10px 0;
      border-top:1px solid var(--border);
    }

    .item:first-child{border-top:none}

    .search{
      display:flex;
      gap:10px;
      margin-bottom:20px;
    }

    .search input{
      flex:1;
      padding:10px;
      border-radius:10px;
      border:1px solid var(--border);
      background:var(--panel);
      color:var(--text);
    }

    @media(max-width:900px){
      .app{grid-template-columns:1fr}
      .grid{grid-template-columns:1fr}
      .span-3,.span-6,.span-12{grid-column:span 1}
    }
  </style>
</head>

<body>

<div class="app">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="brand">🛡️ Brigade Judiciaire</div>

    <nav class="nav">
      <a class="active" href="#">Tableau de bord</a>
      <a href="#">Sanctions</a>
      <a href="#">Ajouter</a>
      <a href="#">Demandes</a>
    </nav>

    <div class="user">
      Oka Zen'in
      <br><br>
      <button class="btn">Déconnexion</button>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">

    <div class="header">
      <h1>Tableau de bord</h1>
      <span class="chip">Auto refresh 20s</span>
    </div>

    <div class="search">
      <input placeholder="Rechercher..." />
      <button class="btn accent">OK</button>
    </div>

    <!-- KPIs -->
    <div class="grid">

      <div class="card span-3">
        <div class="section-title">Sanctions</div>
        <div class="kpi">4</div>
      </div>

      <div class="card span-3">
        <div class="section-title">Blâmes</div>
        <div class="kpi">1</div>
      </div>

      <div class="card span-3">
        <div class="section-title">Demandes</div>
        <div class="kpi">0</div>
      </div>

      <div class="card span-3">
        <div class="section-title">Status</div>
        OK
      </div>

      <!-- LISTE -->
      <div class="card span-6">
        <div class="section-title">Sanctions récentes</div>

        <ul class="list">
          <li class="item">
            <span>Misa</span>
            <span class="badge warn">Actif</span>
          </li>
        </ul>
      </div>

      <div class="card span-6">
        <div class="section-title">Contestations</div>
        Aucune
      </div>

    </div>

  </main>
</div>

</body>
</html>
